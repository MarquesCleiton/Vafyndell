<!-- =========================================================
     CADASTRO DE NPC — Eldritch Archive
     ========================================================= -->
<div class="sheet-wrapper">
  <div class="sheet-scroll">
    <div class="form-container">

      <form #form="ngForm" id="formNpc" (ngSubmit)="salvar(form)">

        <!-- ── Upload de Imagem ── -->
        <div class="upload-area">
          <ng-container *ngIf="imagemBase64Temp || (npc.imagem && npc.imagem !== '-'); else uploadBox">
            <img [src]="imagemBase64Temp || npc.imagem" class="upload-img-preview" alt="Preview do NPC" />
            <button type="button" class="upload-remove-btn" (click)="removerImagem()" title="Remover imagem">✖</button>
          </ng-container>
          <ng-template #uploadBox>
            <label class="upload-box">
              <span class="upload-box-icon">📷</span>
              <span class="upload-box-text">ENVIAR IMAGEM</span>
              <input type="file" class="d-none" (change)="onFileChange($event)" accept="image/*" />
            </label>
          </ng-template>
        </div>

        <!-- ── Identidade ── -->
        <h2 class="form-section-title">👹 Cadastro de Feras & Vilões</h2>
        <div class="divider-blade"></div>

        <!-- Nome -->
        <div class="field-group">
          <label class="field-label">Nome *</label>
          <input
            type="text"
            class="field-input"
            [(ngModel)]="npc.nome"
            name="nome"
            required
            placeholder="Ex: Panthor, O Devorador"
          />
        </div>

        <!-- Classificação -->
        <div class="field-group">
          <label class="field-label">Classificação *</label>
          <select class="field-select" [(ngModel)]="npc.classificacao" name="classificacao" required>
            <option *ngFor="let c of classificacoes">{{ c }}</option>
          </select>
        </div>

        <!-- Tipo -->
        <div class="field-group">
          <label class="field-label">Tipo *</label>
          <select class="field-select" [(ngModel)]="npc.tipo" name="tipo" required>
            <option *ngFor="let t of tipos">{{ t }}</option>
          </select>
        </div>

        <!-- Alinhamento -->
        <div class="field-group">
          <label class="field-label">Alinhamento</label>
          <select class="field-select" [(ngModel)]="npc.alinhamento" name="alinhamento">
            <option value="" disabled selected>Selecione...</option>
            <option>Leal e Bom (Lawful Good)</option>
            <option>Neutro e Bom (Neutral Good)</option>
            <option>Caótico e Bom (Chaotic Good)</option>
            <option>Leal e Neutro (Lawful Neutral)</option>
            <option>Neutro (Neutral)</option>
            <option>Caótico e Neutro (Chaotic Neutral)</option>
            <option>Leal e Mau (Lawful Evil)</option>
            <option>Neutro e Mau (Neutral Evil)</option>
            <option>Caótico e Mau (Chaotic Evil)</option>
          </select>
        </div>

        <div class="divider-blade"></div>

        <!-- ── Atributos Numéricos ── -->
        <h2 class="section-title">Atributos Numéricos</h2>
        <div class="edit-attrs-grid">
          <div class="edit-attr-box" *ngFor="let attr of atributosNumericos">
            <span class="edit-attr-label">{{ attr.icon }} {{ attr.label }}</span>
            <div class="edit-attr-controls">
              <button type="button" class="edit-attr-btn" (click)="ajustarValor(attr.key, -1)">−</button>
              <input
                type="number"
                class="edit-attr-input"
                [ngModel]="getValor(attr.key)"
                (ngModelChange)="setValor(attr.key, $event)"
                [name]="attr.key"
                min="0"
              />
              <button type="button" class="edit-attr-btn" (click)="ajustarValor(attr.key, 1)">+</button>
            </div>
          </div>
        </div>

        <div class="divider-blade" style="opacity:0.5"></div>

        <!-- ── Descrição ── -->
        <h2 class="section-title" style="margin-bottom:12px">Descrição & Ataques</h2>

        <div class="field-group">
          <label class="field-label">📝 Descrição</label>
          <textarea
            class="field-input field-textarea auto-expand"
            rows="3"
            [(ngModel)]="npc.descricao"
            name="descricao"
            placeholder="Descreva o NPC, sua aparência, comportamento..."
          ></textarea>
        </div>

        <div class="field-group">
          <label class="field-label">⚔️ Ataques</label>
          <textarea
            class="field-input field-textarea auto-expand"
            rows="3"
            [(ngModel)]="npc.ataques"
            name="ataques"
            placeholder="Descreva os ataques e habilidades especiais..."
          ></textarea>
        </div>

      </form>

    </div>
  </div>

  <!-- FABs -->
  <div class="fab-stack">
    <!-- Cancelar -->
    <button class="fab fab-back" (click)="cancelar()" title="Cancelar">⬅️</button>
    <!-- Salvar -->
    <button
      type="submit"
      form="formNpc"
      class="fab fab-save"
      [disabled]="salvando"
      title="Salvar"
    >
      <ng-container *ngIf="!salvando">💾</ng-container>
      <ng-container *ngIf="salvando">
        <span class="spinner-border spinner-border-sm"></span>
      </ng-container>
    </button>
  </div>

</div>
