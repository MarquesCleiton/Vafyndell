<!-- =========================================================
     CADASTRO INVENTÁRIO — Eldritch Archive
     ========================================================= -->
<div class="sheet-wrapper">
  <div class="sheet-scroll">
    <div class="form-container">

      <form #form="ngForm" (ngSubmit)="salvar(form)" id="formInventario">
        
        <h2 class="form-section-title">
          🎒 {{ editando ? 'Editar Item do Inventário' : 'Adicionar ao Inventário' }}
        </h2>
        <div class="divider-blade"></div>

        <!-- ── Item (Autocomplete) ── -->
        <div class="field-group mt-3">
          <label class="field-label">🏷️ Item *</label>
          <mat-form-field appearance="fill" class="w-100 eldritch-mat-field">
            <input type="text" matInput placeholder="Selecione ou pesquise..." [(ngModel)]="filtro" name="filtro"
              [matAutocomplete]="auto" (input)="filtrarItens()" [readonly]="editando" />
            
            <button mat-icon-button matSuffix disabled class="eldritch-dropdown-arrow">
              <mat-icon>arrow_drop_down</mat-icon>
            </button>

            <mat-autocomplete #auto="matAutocomplete" (optionSelected)="selecionarItem($event.option.value)">
              <mat-option *ngIf="!editando" (click)="novoItem()" class="eldritch-mat-option new-item-opt">
                <mat-icon class="me-2">add_circle</mat-icon> Novo
              </mat-option>

              <mat-option *ngFor="let c of catalogoFiltrado" [value]="c" class="eldritch-mat-option">
                <div class="d-flex align-items-center">
                  <ng-container *ngIf="c.imagem && c.imagem !== '-'; else noItemIcon">
                    <img [src]="c.imagem" class="mat-opt-img" />
                  </ng-container>
                  <ng-template #noItemIcon>
                    <span class="mat-opt-icon">📦</span>
                  </ng-template>
                  <span>{{ c.nome }}</span>
                </div>
              </mat-option>
            </mat-autocomplete>
          </mat-form-field>
        </div>

        <!-- ── Preview do Selecionado ── -->
        <div *ngIf="selecionado" class="preview-card mb-4">
          <div class="d-flex align-items-center">
            <ng-container *ngIf="selecionado.imagem && selecionado.imagem !== '-'; else noPreviewIcon">
              <img [src]="selecionado.imagem" class="preview-img">
            </ng-container>
            <ng-template #noPreviewIcon>
              <span class="preview-icon">📦</span>
            </ng-template>
            <div class="preview-info">
              <h6 class="preview-nome">{{ selecionado.nome }}</h6>
              <small class="preview-sub">{{ selecionado.categoria }} | {{ selecionado.raridade }}</small>
            </div>
          </div>
        </div>

        <div class="divider-blade" style="opacity: 0.5;"></div>

        <!-- ── Quantidade ── -->
        <div class="d-flex justify-content-between align-items-center my-3">
          <label class="field-label mb-0">🔢 Quantidade *</label>
          <div class="edit-attr-controls">
            <button type="button" class="edit-attr-btn" (click)="decrementar()">−</button>
            <input type="number" class="edit-attr-input" [(ngModel)]="quantidade" name="quantidade" min="0" required />
            <button type="button" class="edit-attr-btn" (click)="incrementar()">+</button>
          </div>
        </div>

        <div class="divider-blade" style="opacity: 0.5;"></div>

        <!-- ── Descrição ── -->
        <div class="field-group mt-3">
          <label class="field-label">📝 Descrição (opcional)</label>
          <textarea class="field-input auto-expand" rows="3" [(ngModel)]="descricao" name="descricao"
            placeholder="Ex: Comprado no mercado, ganho em missão, achado nas ruínas..."></textarea>
        </div>

      </form>
    </div>
  </div>

  <!-- FABs -->
  <div class="fab-stack">
    <!-- Cancelar -->
    <button type="button" class="fab fab-back" (click)="cancelar()" title="Cancelar">⬅️</button>
    <!-- Salvar -->
    <button type="submit" form="formInventario" class="fab fab-save" [disabled]="form.invalid || salvando" title="Salvar">
      <ng-container *ngIf="!salvando">💾</ng-container>
      <ng-container *ngIf="salvando">
        <span class="spinner-border spinner-border-sm"></span>
      </ng-container>
    </button>
  </div>
</div>
